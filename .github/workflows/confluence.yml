name: Confluence Triggered SmartSearch Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target target runtime instance environment selector'
        required: true
        default: 'PREPROD'
      market:
        description: 'Target localized user market context container filter'
        required: true
        default: 'AU-EN'
      test_suite:
        description: 'The specific test suite description block to execute'
        required: true
        default: 'all'

jobs:
  execute-playwright-automation:
    runs-on: [linux, self-hosted]
    
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Playwright Browser Engines
        run: npx playwright install --with-deps

      # Maps runtime environments to configuration arguments inside your project
      - name: Execute SmartSearch Test Suites
        env:
          TARGET_ENV: ${{ github.event.inputs.environment }}
          TARGET_MARKET: ${{ github.event.inputs.market }}
        run: |
          echo "Target Environment: $TARGET_ENV"
          echo "Target Market Language context: $TARGET_MARKET"
          
          if [ "${{ github.event.inputs.test_suite }}" = "all" ]; then
            echo "Launching complete automation run sequence"
            npx playwright test
          else
            echo "Filtering targeting constraints directly down to: [SmartSearch] ${{ github.event.inputs.test_suite }}"
            npx playwright test --grep "\[SmartSearch\] ${{ github.event.inputs.test_suite }}"
          fi

      - name: Archive Execution Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-execution-report
          path: playwright-report/
          retention-days: 30
