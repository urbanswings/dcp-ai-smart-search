# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://github.com

name: Playwright Tests
run-name: >-
  [${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT || 'PREPROD' }}][${{ inputs.COUNTRY != '' && inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || 'EN' }}] 
  ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}

on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: "Select Environment"
        type: choice
        required: true
        default: "PREPROD"
        options:
          - INT
          - PREPROD
          - PROD
      COUNTRY:
        description: "Select Country"
        type: choice
        required: true
        options:
          - AU
          - IN
          - JP
          - KR
          - SG
          - TH
          - TR
      LANGUAGE:
        description: "Select Language"
        type: choice
        required: true
        options:
          - EN
          - TR
          - TH
          - KO
          - JA
      TEST_DESCRIBE:
        description: "Select Test Describe"
        type: choice
        required: false
        options:
          - "None"
          - "AI Smart Search - Sanity"
          - "AI Smart Search - Vehicles MB"
          - "AI Smart Search - Vehicles MB - Range Facets"
          - "AI Smart Search - Vehicles MB - Negative Facets"
          - "AI Smart Search - Vehicles Non-MB"
          - "AI Smart Search - Input Robustness"
          - "AI Smart Search - Constraint Handling"
          - "AI Smart Search - Conversational Behavior"
          - "AI Smart Search - Safety / Policy / Abuse"
          - "AI Smart Search - Reliability"
      TEST_TITLE:
        description: "Select Test Title"
        type: choice
        required: false
        options:
          - "None"
          - "[AI Smart Search - Sanity] By Fixed Query"
          - "[AI Smart Search - Sanity] Recommendation Model"
          - "[AI Smart Search - Sanity] By Filter Facets (complete)"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('bodyType')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('brand')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('campaigns')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('color')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('colorPolish')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('enginePowerHP')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('enginePowerKW')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('firstRegistrationDate')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('fuelType')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('lines')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('mileage')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('modelIdentifier')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('modelYear')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('motorization')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('packages')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('price')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('stockType')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('upholstery')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets ('upholsteryPolish')"
          - "[AI Smart Search - Vehicles MB] By Filter Facets (AND/OR)"
          - "[AI Smart Search - Vehicles MB] By Filter Facets (matrix)"
          - "[AI Smart Search - Vehicles MB] By Brand/Model"
          - "[AI Smart Search - Vehicles MB] By Specs"
          - "[AI Smart Search - Vehicles MB] No Brand/Model"
          - "[AI Smart Search - Vehicles MB] Superlative"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('price')"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('monthlyRate')"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('mileage')"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('enginePowerHP')"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('enginePowerKW')"
          - "[AI Smart Search - Vehicles MB - Range Facets] By Filter Facets ('modelYear')"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('bodyType')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('brand')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('campaigns')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('color')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('colorPolish')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('enginePowerHP')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('enginePowerKW')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('firstRegistrationDate')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('fuelType')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('lines')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('mileage')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('modelIdentifier')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('modelYear')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('motorization')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('packages')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('price')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('stockType')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('upholstery')(-ve)"
          - "[AI Smart Search - Vehicles MB - Negative Facets] By Filter Facets ('upholsteryPolish')(-ve)"
          - "[AI Smart Search - Vehicles Non-MB] By Brand/Model (Sentence|Single)"
          - "[AI Smart Search - Vehicles Non-MB] By Brand/Model (Keyword|Single)"
          - "[AI Smart Search - Vehicles Non-MB] By Brand/Model (Keyword|Mix)"
          - "[AI Smart Search - Vehicles Non-MB] By Non-MB Features"
          - "[AI Smart Search - Input Robustness] Edge Case Queries"
          - "[AI Smart Search - Input Robustness] Random Numbers"
          - "[AI Smart Search - Input Robustness] Misspelled/Fuzzy Queries"
          - "[AI Smart Search - Input Robustness] Language/Localization"
          - "[AI Smart Search - Input Robustness] Unusual Units Queries"
          - "[AI Smart Search - Constraint Handling] Date Range/Numeric Filters"
          - "[AI Smart Search - Constraint Handling] Numeric Unit Variations"
          - "[AI Smart Search - Constraint Handling] Negative/Contradictory Queries"
          - "[AI Smart Search - Constraint Handling] Conflicting Filter Facets"
          - "[AI Smart Search - Constraint Handling] Conflicting Brands"
          - "[AI Smart Search - Constraint Handling] No Results Scenario"
          - "[AI Smart Search - Conversational Behavior] Multi-Intent Queries"
          - "[AI Smart Search - Conversational Behavior] Clarification Queries"
          - "[AI Smart Search - Conversational Behavior] Price Negotiation Queries"
          - "[AI Smart Search - Conversational Behavior] Sales"
          - "[AI Smart Search - Conversational Behavior] Joke/Humor Queries"
          - "[AI Smart Search - Conversational Behavior] Repeat/Looping Queries"
          - "[AI Smart Search - Conversational Behavior] Brand Loyalty/Switching Queries"
          - "[AI Smart Search - Conversational Behavior] Accessibility Needs Queries"
          - "[AI Smart Search - Conversational Behavior] Environmental Concerns Queries"
          - "[AI Smart Search - Safety / Policy / Abuse] Personal Data"
          - "[AI Smart Search - Safety / Policy / Abuse] NSFW"
          - "[AI Smart Search - Safety / Policy / Abuse] Code and Scripts"
          - "[AI Smart Search - Safety / Policy / Abuse] Bias and Manipulation"
          - "[AI Smart Search - Safety / Policy / Abuse] Random Topics"
          - "[AI Smart Search - Reliability] Response Consistency"

jobs:
  test:
    runs-on: [self-hosted, linux]
    environment: ${{ inputs.ENVIRONMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT }}
          COUNTRY: ${{ inputs.COUNTRY != '' && inputs.COUNTRY || vars.COUNTRY }}
          LANGUAGE: ${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || vars.LANGUAGE }}
          PRODUCT: ${{ vars.PRODUCT }}
          VEHICLE_CATEGORY: ${{ vars.VEHICLE_CATEGORY }}
          PROJECT: ${{ vars.PROJECT }}
          API_ENDPOINT_LOCAL: ${{ vars.API_ENDPOINT_LOCAL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          TEST_MODE: ${{ vars.TEST_MODE }}
          TEST_FACETS: ${{ vars.TEST_FACETS }}
          FIXED_QUERIES_ONLY: ${{ vars.FIXED_QUERIES_ONLY }}
          OVERRIDE_CONFIG_FILE: ${{ vars.OVERRIDE_CONFIG_FILE }}
          AEM_USER_PREPROD: ${{ secrets.AEM_USER_PREPROD }}
          AEM_PASS_PREPROD: ${{ secrets.AEM_PASS_PREPROD }}
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          NEXUS_API_VERSION: ${{ vars.NEXUS_API_VERSION }}
          NEXUS_API_ENDPOINT: ${{ vars.NEXUS_API_ENDPOINT }}
          NEXUS_GPT_MODEL: ${{ vars.NEXUS_GPT_MODEL }}
          OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
          CHOSEN_DESCRIBE: ${{ inputs.TEST_DESCRIBE }}
          CHOSEN_TITLE: ${{ inputs.TEST_TITLE }}
        run: |
          escape_regex() {
            perl -e 'print quotemeta($ARGV[0])' "$1"
          }

          # 1. Strip everything up to and including ']' and trim whitespace
          CLEANED_TITLE=$(echo "$CHOSEN_TITLE" | sed -E 's/^.*\][[:space:]]*//')
          ESCAPED_DESCRIBE=$(escape_regex "$CHOSEN_DESCRIBE")
          ESCAPED_TITLE=$(escape_regex "$CLEANED_TITLE")

          # 2. Check if specific Test Title is selected
          if [ -n "$CLEANED_TITLE" ] && [ "$CLEANED_TITLE" != "None" ]; then
            GREP_PATTERN="${ESCAPED_DESCRIBE}.*${ESCAPED_TITLE}"
            echo "Running '$CLEANED_TITLE' test title in '$CHOSEN_DESCRIBE'"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"$GREP_PATTERN\""
            npx playwright test tests/search.spec.ts -g "$GREP_PATTERN"
            
          # 3. Check if a Test Describe block is selected instead
          elif [ -n "$CHOSEN_DESCRIBE" ] && [ "$CHOSEN_DESCRIBE" != "None" ]; then
            GREP_PATTERN="${ESCAPED_DESCRIBE}(?! -)"
            echo "Running strict '$CHOSEN_DESCRIBE' describe block only"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"$GREP_PATTERN\""
            npx playwright test tests/search.spec.ts -g "$GREP_PATTERN"
            
          # 4. Else fallback to running everything
          else
            echo "Running ALL tests"
            echo "Executing: npx playwright test tests/search.spec.ts"
            npx playwright test tests/search.spec.ts
          fi

      - name: Generate HTML report
        if: ${{ !cancelled() }}
        run: node generate-results-html.js

      - name: Upload test artifacts
        id: upload-step
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: "smart-search-results - [${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT || 'PREPROD' }}][${{ inputs.COUNTRY != '' && inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || 'EN' }}] ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }} #${{ github.run_number }}"
          path: |
            playwright-report/
            results/json/
            results/html/
          if-no-files-found: warn
          retention-days: 30

      - name: Send Microsoft Teams Notification
        if: ${{ !cancelled() }}
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Dynamically builds the exact direct download ZIP link:
          ARTIFACT_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-step.outputs.artifact-id }}"
          MARKET: "${{ inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE || 'EN' }}"
          SCOPE: "${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}"
          ACTOR: "${{ github.actor }}"
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ Playwright Tests Passed"
          else
            TITLE="❌ Playwright Tests Failed"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "body": [
                    { "type": "TextBlock", "size": "Medium", "weight": "Bolder", "text": "$TITLE" },
                    { "type": "FactSet", "facts": [
                        { "title": "Workflow Run:", "value": "#$RUN_NUM" },
                        { "title": "Market Environment:", "value": "$MARKET" },
                        { "title": "Scope:", "value": "$SCOPE" },
                        { "title": "Triggered By:", "value": "@$ACTOR" }
                      ]
                    }
                  ],
                  "actions": [
                    { "type": "Action.OpenUrl", "title": "View Run Summary", "url": "$RUN_URL" },
                    { "type": "Action.OpenUrl", "title": "📥 Download Test Artifacts", "url": "$ARTIFACT_URL" }
                  ],
                  "$schema": "http://adaptivecards.io",
                  "version": "1.5"
                }
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$TEAMS_WEBHOOK"
