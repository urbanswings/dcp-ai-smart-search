# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Playwright Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
 test:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout repository
       uses: actions/checkout@v5

     - name: Set up Node.js
       uses: actions/setup-node@v5
       with:
         node-version: 18

     - name: Install dependencies
       run: npm ci

     - name: Install Playwright browsers
       run: npx playwright install --with-deps

     - name: Run Playwright tests
       env:
         ENVIRONMENT: ${{ vars.ENVIRONMENT }}
         COUNTRY: ${{ vars.COUNTRY }}
         LANGUAGE: ${{ vars.LANGUAGE }}
         PRODUCT: ${{ vars.PRODUCT }}
         VEHICLECATEGORY: ${{ vars.VEHICLECATEGORY }}
         PROJECT: ${{ vars.PROJECT }}
         API_ENDPOINT_LOCAL: ${{ vars.API_ENDPOINT_LOCAL }}
         X_API_KEY: ${{ secrets.X_API_KEY }}
         TEST_MODE: ${{ vars.TEST_MODE }}
         TEST_FACETS: ${{ vars.TEST_FACETS }}
         FIXED_QUERIES_ONLY: ${{ vars.FIXED_QUERIES_ONLY }}
         OVERRIDE_CONFIG_FILE: ${{ vars.OVERRIDE_CONFIG_FILE }}
         AEM_USER_PREPROD: ${{ secrets.AEM_USER_PREPROD }}         
         AEM_PASS_PREPROD: ${{ secrets.AEM_PASS_PREPROD }}
         NEXUS_API_KEY: ${{ secrets.OVERRIDE_CONFIG_FILE }}
         NEXUS_API_VERSION: ${{ vars.NEXUS_API_VERSION }}
         NEXUS_API_ENDPOINT: ${{ vars.NEXUS_API_ENDPOINT }}
         NEXUS_GPT_MODEL: ${{ vars.NEXUS_GPT_MODEL }}
       run: npx playwright test

     - name: Generate report
       uses: actions/upload-artifact@v4
       if: ${{ !cancelled() }}
       with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30  
