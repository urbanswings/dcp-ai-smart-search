# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Playwright Tests
run-name: Playwright Tests - ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      COUNTRY:
        description: "Select Country"
        type: choice
        required: true
        options:
          - AU
          - IN
          - JP
          - KR
          - SG
          - TH
          - TR
      LANGUAGE:
        description: "Select Language"
        type: choice
        required: true
        options:
          - EN
          - TR
          - TH
          - KO
          - JA
      TEST_DESCRIBE:
        description: "Select Test Describe"
        type: choice
        required: false
        options:
          - "None"
          - "AI Smart Search - Sanity"
          - "AI Smart Search - Vehicles MB"
          - "AI Smart Search - Vehicles MB - Negative Facets"
      TEST_TITLE:
        description: "Select Test Title"
        type: choice
        required: false
        options:
          - "None"
          - "[AI Smart Search - Sanity] By Fixed Query"
          - "[AI Smart Search - Sanity] Recommendation Model"
          - "[AI Smart Search - Sanity] By Filter Facets (complete)"

jobs:
  test:
    runs-on: ubuntu-latest
    environment: PREPROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          COUNTRY: ${{ inputs.COUNTRY != '' && inputs.COUNTRY || vars.COUNTRY }}
          LANGUAGE: ${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || vars.LANGUAGE }}
          PRODUCT: ${{ vars.PRODUCT }}
          VEHICLE_CATEGORY: ${{ vars.VEHICLE_CATEGORY }}
          PROJECT: ${{ vars.PROJECT }}
          API_ENDPOINT_LOCAL: ${{ vars.API_ENDPOINT_LOCAL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          TEST_MODE: ${{ vars.TEST_MODE }}
          TEST_FACETS: ${{ vars.TEST_FACETS }}
          FIXED_QUERIES_ONLY: ${{ vars.FIXED_QUERIES_ONLY }}
          OVERRIDE_CONFIG_FILE: ${{ vars.OVERRIDE_CONFIG_FILE }}
          AEM_USER_PREPROD: ${{ secrets.AEM_USER_PREPROD }}
          AEM_PASS_PREPROD: ${{ secrets.AEM_PASS_PREPROD }}
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          NEXUS_API_VERSION: ${{ vars.NEXUS_API_VERSION }}
          NEXUS_API_ENDPOINT: ${{ vars.NEXUS_API_ENDPOINT }}
          NEXUS_GPT_MODEL: ${{ vars.NEXUS_GPT_MODEL }}
          OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
          TEST_DESCRIBE: ${{ inputs.TEST_DESCRIBE }}
          CHOSEN_DESCRIBE: ${{ inputs.TEST_DESCRIBE }}
          CHOSEN_TITLE: ${{ inputs.TEST_TITLE }}
        run: |
          # 1. Check if specific Test Title is selected
          if [ -n "$CHOSEN_TITLE" ] && [ "$CHOSEN_TITLE" != "None" ]; then
            echo "Running '$CHOSEN_TITLE' test title only"
            npx playwright test tests/search.spec.ts -g "$CHOSEN_TITLE"
            
          # 2. Check if a Test Describe block is selected instead
          elif [ -n "$CHOSEN_DESCRIBE" ] && [ "$CHOSEN_DESCRIBE" != "None" ]; then
            echo "Running '$CHOSEN_DESCRIBE' test describe only"
            npx playwright test tests/search.spec.ts -g "$CHOSEN_DESCRIBE"
            
          # 3. Else fallback to running everything
          else
            echo "Running ALL tests"
            npx playwright test tests/search.spec.ts
          fi

      - name: Generate HTML report
        if: ${{ !cancelled() }}
        run: node generate-results-html.js

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smart-search-results
          path: |
            results/json/
            results/html/
          if-no-files-found: warn
          retention-days: 30
