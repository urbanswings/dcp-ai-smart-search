# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://github.com

name: Playwright Tests
run-name: >-
  [${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT || 'PREPROD' }}][${{ inputs.COUNTRY != '' && inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || 'EN' }}] 
  ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}

on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: "Select Environment"
        type: choice
        required: true
        default: "PREPROD"
        options:
          - INT
          - PREPROD
          - PROD
      COUNTRY:
        description: "Select Country"
        type: choice
        required: true
        options:
          - AU
          - IN
          - JP
          - KR
          - SG
          - TH
          - TR
      LANGUAGE:
        description: "Select Language"
        type: choice
        required: true
        options:
          - EN
          - TR
          - TH
          - KO
          - JA
      TEST_DESCRIBE:
        description: "Select Test Describe"
        type: choice
        required: false
        options:
          - "None"
          - "[SmartSearch] Sanity"
          - "[SmartSearch] Vehicles MB"
          - "[SmartSearch] Vehicles MB - Range Facets"
          - "[SmartSearch] Vehicles MB - Negative Facets"
          - "[SmartSearch] Vehicles Non-MB"
          - "[SmartSearch] Input Robustness"
          - "[SmartSearch] Constraint Handling"
          - "[SmartSearch] Conversational Behavior"
          - "[SmartSearch] Safety / Policy / Abuse"
          - "[SmartSearch] Reliability"
      TEST_TITLE:
        description: "Select Test Title"
        type: choice
        required: false
        options:
          - "None"
          - "[SmartSearch] Sanity > By Fixed Query"
          - "[SmartSearch] Sanity > Recommendation Model"
          - "[SmartSearch] Sanity > By Filter Facets (complete)"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('bodyType')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('brand')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('campaigns')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('color')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('colorPolish')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('enginePowerHP')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('enginePowerKW')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('firstRegistrationDate')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('fuelType')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('lines')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('mileage')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('modelIdentifier')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('modelYear')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('motorization')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('packages')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('price')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('stockType')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('upholstery')"
          - "[SmartSearch] Vehicles MB > By Filter Facets ('upholsteryPolish')"
          - "[SmartSearch] Vehicles MB > By Filter Facets (AND/OR)"
          - "[SmartSearch] Vehicles MB > By Filter Facets (matrix)"
          - "[SmartSearch] Vehicles MB > By Brand/Model"
          - "[SmartSearch] Vehicles MB > By Specs"
          - "[SmartSearch] Vehicles MB > No Brand/Model"
          - "[SmartSearch] Vehicles MB > Superlative"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('price')"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('monthlyRate')"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('mileage')"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('enginePowerHP')"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('enginePowerKW')"
          - "[SmartSearch] Vehicles MB - Range Facets > By Filter Facets ('modelYear')"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('bodyType')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('brand')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('campaigns')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('color')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('colorPolish')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('enginePowerHP')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('enginePowerKW')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('firstRegistrationDate')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('fuelType')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('lines')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('mileage')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('modelIdentifier')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('modelYear')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('motorization')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('packages')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('price')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('stockType')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('upholstery')(-ve)"
          - "[SmartSearch] Vehicles MB - Negative Facets > By Filter Facets ('upholsteryPolish')(-ve)"
          - "[SmartSearch] Vehicles Non-MB > By Brand/Model (Sentence|Single)"
          - "[SmartSearch] Vehicles Non-MB > By Brand/Model (Keyword|Single)"
          - "[SmartSearch] Vehicles Non-MB > By Brand/Model (Keyword|Mix)"
          - "[SmartSearch] Vehicles Non-MB > By Non-MB Features"
          - "[SmartSearch] Input Robustness > Edge Case Queries"
          - "[SmartSearch] Input Robustness > Random Numbers"
          - "[SmartSearch] Input Robustness > Misspelled/Fuzzy Queries"
          - "[SmartSearch] Input Robustness > Language/Localization"
          - "[SmartSearch] Input Robustness > Unusual Units Queries"
          - "[SmartSearch] Constraint Handling > Date Range/Numeric Filters"
          - "[SmartSearch] Constraint Handling > Numeric Unit Variations"
          - "[SmartSearch] Constraint Handling > Negative/Contradictory Queries"
          - "[SmartSearch] Constraint Handling > Conflicting Filter Facets"
          - "[SmartSearch] Constraint Handling > Conflicting Brands"
          - "[SmartSearch] Constraint Handling > No Results Scenario"
          - "[SmartSearch] Conversational Behavior > Multi-Intent Queries"
          - "[SmartSearch] Conversational Behavior > Clarification Queries"
          - "[SmartSearch] Conversational Behavior > Price Negotiation Queries"
          - "[SmartSearch] Conversational Behavior > Sales"
          - "[SmartSearch] Conversational Behavior > Joke/Humor Queries"
          - "[SmartSearch] Conversational Behavior > Repeat/Looping Queries"
          - "[SmartSearch] Conversational Behavior > Brand Loyalty/Switching Queries"
          - "[SmartSearch] Conversational Behavior > Accessibility Needs Queries"
          - "[SmartSearch] Conversational Behavior > Environmental Concerns Queries"
          - "[SmartSearch] Safety / Policy / Abuse > Personal Data"
          - "[SmartSearch] Safety / Policy / Abuse > NSFW"
          - "[SmartSearch] Safety / Policy / Abuse > Code and Scripts"
          - "[SmartSearch] Safety / Policy / Abuse > Bias and Manipulation"
          - "[SmartSearch] Safety / Policy / Abuse > Random Topics"
          - "[SmartSearch] Reliability > Response Consistency"

jobs:
  test:
    runs-on: [self-hosted, linux]
    environment: ${{ inputs.ENVIRONMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT }}
          COUNTRY: ${{ inputs.COUNTRY != '' && inputs.COUNTRY || vars.COUNTRY }}
          LANGUAGE: ${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || vars.LANGUAGE }}
          PRODUCT: ${{ vars.PRODUCT }}
          VEHICLE_CATEGORY: ${{ vars.VEHICLE_CATEGORY }}
          PROJECT: ${{ vars.PROJECT }}
          API_ENDPOINT_LOCAL: ${{ vars.API_ENDPOINT_LOCAL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          TEST_MODE: ${{ vars.TEST_MODE }}
          TEST_FACETS: ${{ vars.TEST_FACETS }}
          FIXED_QUERIES_ONLY: ${{ vars.FIXED_QUERIES_ONLY }}
          OVERRIDE_CONFIG_FILE: ${{ vars.OVERRIDE_CONFIG_FILE }}
          AEM_USER_PREPROD: ${{ secrets.AEM_USER_PREPROD }}
          AEM_PASS_PREPROD: ${{ secrets.AEM_PASS_PREPROD }}
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          NEXUS_API_VERSION: ${{ vars.NEXUS_API_VERSION }}
          NEXUS_API_ENDPOINT: ${{ vars.NEXUS_API_ENDPOINT }}
          NEXUS_GPT_MODEL: ${{ vars.NEXUS_GPT_MODEL }}
          OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
          CHOSEN_DESCRIBE: ${{ inputs.TEST_DESCRIBE }}
          CHOSEN_TITLE: ${{ inputs.TEST_TITLE }}
        run: |
          escape_regex() {
            perl -e 'print quotemeta($ARGV[0])' "$1"
          }

          # 1. Extract title part from either legacy "... ] Title" or new "... > Title" format
          if echo "$CHOSEN_TITLE" | grep -q ' > '; then
            CLEANED_TITLE=$(echo "$CHOSEN_TITLE" | sed -E 's/^.* >[[:space:]]*//')
          else
            CLEANED_TITLE=$(echo "$CHOSEN_TITLE" | sed -E 's/^.*\][[:space:]]*//')
          fi
          ESCAPED_DESCRIBE=$(escape_regex "$CHOSEN_DESCRIBE")
          ESCAPED_TITLE=$(escape_regex "$CLEANED_TITLE")

          # 2. Check if specific Test Title is selected
          if [ -n "$CLEANED_TITLE" ] && [ "$CLEANED_TITLE" != "None" ]; then
            if [ -n "$CHOSEN_DESCRIBE" ] && [ "$CHOSEN_DESCRIBE" != "None" ]; then
              GREP_PATTERN="${ESCAPED_DESCRIBE}.*${ESCAPED_TITLE}"
            else
              GREP_PATTERN="${ESCAPED_TITLE}"
            fi
            echo "Running '$CLEANED_TITLE' test title in '$CHOSEN_DESCRIBE'"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"$GREP_PATTERN\""
            npx playwright test tests/search.spec.ts -g "$GREP_PATTERN"
            
          # 3. Check if a Test Describe block is selected instead
          elif [ -n "$CHOSEN_DESCRIBE" ] && [ "$CHOSEN_DESCRIBE" != "None" ]; then
            GREP_PATTERN="${ESCAPED_DESCRIBE}(?! -)"
            echo "Running strict '$CHOSEN_DESCRIBE' describe block only"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"$GREP_PATTERN\""
            npx playwright test tests/search.spec.ts -g "$GREP_PATTERN"
            
          # 4. Else fallback to running everything
          else
            echo "Running ALL tests"
            echo "Executing: npx playwright test tests/search.spec.ts"
            npx playwright test tests/search.spec.ts
          fi

      - name: Generate HTML report
        if: ${{ !cancelled() }}
        run: node generate-results-html.js

      - name: Build safe artifact metadata
        if: ${{ !cancelled() }}
        id: artifact-meta
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT != '' && inputs.ENVIRONMENT || vars.ENVIRONMENT || 'PREPROD' }}
          COUNTRY: ${{ inputs.COUNTRY != '' && inputs.COUNTRY || 'AU' }}
          LANGUAGE: ${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || 'EN' }}
          RAW_SCOPE: ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}
        run: |
          SAFE_SCOPE=$(printf '%s' "$RAW_SCOPE" | tr '\r\n' '  ' | sed -E 's/["\:<\>|*?\\/]+/-/g; s/[[:space:]]+/ /g; s/^[[:space:]-]+//; s/[[:space:]-]+$//; s/-{2,}/-/g')
          if [ -z "$SAFE_SCOPE" ]; then
            SAFE_SCOPE="Full Test Suite"
          fi

          ARTIFACT_NAME="smart-search-results - [${ENVIRONMENT}][${COUNTRY}-${LANGUAGE}] ${SAFE_SCOPE} #${GITHUB_RUN_NUMBER}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "safe_scope=$SAFE_SCOPE" >> "$GITHUB_OUTPUT"

      - name: Upload test artifacts
        id: upload-step
        uses: actions/upload-artifact@v3
        if: ${{ !cancelled() }}
        with:
          name: ${{ steps.artifact-meta.outputs.artifact_name }}
          path: |
            playwright-report/
            results/json/
            results/html/
          if-no-files-found: warn
          retention-days: 30

      - name: Send Microsoft Teams Notification
        if: ${{ !cancelled() }}
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Dynamically builds the exact direct download ZIP link:
          ARTIFACT_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-step.outputs.artifact-id }}"
          MARKET: "${{ inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE || 'EN' }}"
          SCOPE: "${{ steps.artifact-meta.outputs.safe_scope }}"
          ACTOR: "${{ github.actor }}"
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ Playwright Tests Passed"
          else
            TITLE="❌ Playwright Tests Failed"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "body": [
                    { "type": "TextBlock", "size": "Medium", "weight": "Bolder", "text": "$TITLE" },
                    { "type": "FactSet", "facts": [
                        { "title": "Workflow Run:", "value": "#$RUN_NUM" },
                        { "title": "Market Environment:", "value": "$MARKET" },
                        { "title": "Scope:", "value": "$SCOPE" },
                        { "title": "Triggered By:", "value": "@$ACTOR" }
                      ]
                    }
                  ],
                  "actions": [
                    { "type": "Action.OpenUrl", "title": "View Run Summary", "url": "$RUN_URL" },
                    { "type": "Action.OpenUrl", "title": "📥 Download Test Artifacts", "url": "$ARTIFACT_URL" }
                  ],
                  "$schema": "http://adaptivecards.io",
                  "version": "1.5"
                }
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$TEAMS_WEBHOOK"
