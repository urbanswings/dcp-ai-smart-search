

name: Playwright Tests
run-name: >-
  [${{ inputs.COUNTRY != '' && inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || 'EN' }}] 
  Playwright Tests - 
  ${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      COUNTRY:
        description: "Select Country"
        type: choice
        required: true
        options:
          - AU
          - IN
          - JP
          - KR
          - SG
          - TH
          - TR
      LANGUAGE:
        description: "Select Language"
        type: choice
        required: true
        options:
          - EN
          - TR
          - TH
          - KO
          - JA
      TEST_DESCRIBE:
        description: "Select Test Describe"
        type: choice
        required: false
        options:
          - "None"
          - "AI Smart Search - Sanity"
          - "AI Smart Search - Vehicles MB"
          - "AI Smart Search - Vehicles MB - Negative Facets"
      TEST_TITLE:
        description: "Select Test Title"
        type: choice
        required: false
        options:
          - "None"
          - "[AI Smart Search - Sanity] By Fixed Query"
          - "[AI Smart Search - Sanity] Recommendation Model"
          - "[AI Smart Search - Sanity] By Filter Facets (complete)"

jobs:
  test:
    runs-on: ubuntu-latest
    environment: PREPROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          COUNTRY: ${{ inputs.COUNTRY != '' && inputs.COUNTRY || vars.COUNTRY }}
          LANGUAGE: ${{ inputs.LANGUAGE != '' && inputs.LANGUAGE || vars.LANGUAGE }}
          PRODUCT: ${{ vars.PRODUCT }}
          VEHICLE_CATEGORY: ${{ vars.VEHICLE_CATEGORY }}
          PROJECT: ${{ vars.PROJECT }}
          API_ENDPOINT_LOCAL: ${{ vars.API_ENDPOINT_LOCAL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          TEST_MODE: ${{ vars.TEST_MODE }}
          TEST_FACETS: ${{ vars.TEST_FACETS }}
          FIXED_QUERIES_ONLY: ${{ vars.FIXED_QUERIES_ONLY }}
          OVERRIDE_CONFIG_FILE: ${{ vars.OVERRIDE_CONFIG_FILE }}
          AEM_USER_PREPROD: ${{ secrets.AEM_USER_PREPROD }}
          AEM_PASS_PREPROD: ${{ secrets.AEM_PASS_PREPROD }}
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          NEXUS_API_VERSION: ${{ vars.NEXUS_API_VERSION }}
          NEXUS_API_ENDPOINT: ${{ vars.NEXUS_API_ENDPOINT }}
          NEXUS_GPT_MODEL: ${{ vars.NEXUS_GPT_MODEL }}
          OPENAI_API_VERSION: ${{ vars.OPENAI_API_VERSION }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
          CHOSEN_DESCRIBE: ${{ inputs.TEST_DESCRIBE }}
          CHOSEN_TITLE: ${{ inputs.TEST_TITLE }}
        run: |
          # 1. Strip everything up to and including ']' and trim whitespace
          CLEANED_TITLE=$(echo "$CHOSEN_TITLE" | sed -E 's/^.*\][[:space:]]*//')

          # 2. Check if specific Test Title is selected
          if [ -n "$CLEANED_TITLE" ] && [ "$CLEANED_TITLE" != "None" ]; then
            echo "Running '$CLEANED_TITLE' test title only"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"$CLEANED_TITLE\""
            npx playwright test tests/search.spec.ts -g "$CLEANED_TITLE"
            
          # 3. Check if a Test Describe block is selected instead
          elif [ -n "$CHOSEN_DESCRIBE" ] && [ "$CHOSEN_DESCRIBE" != "None" ]; then
            echo "Running strict '$CHOSEN_DESCRIBE' describe block only"
            echo "Executing: npx playwright test tests/search.spec.ts -g \"${CHOSEN_DESCRIBE}(?! -)\""
            npx playwright test tests/search.spec.ts -g "${CHOSEN_DESCRIBE}(?! -)"
            
          # 4. Else fallback to running everything
          else
            echo "Running ALL tests"
            echo "Executing: npx playwright test tests/search.spec.ts"
            npx playwright test tests/search.spec.ts
          fi

      - name: Generate HTML report
        if: ${{ !cancelled() }}
        run: node generate-results-html.js

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smart-search-results
          path: |
            playwright-report/
            results/json/
            results/html/
          if-no-files-found: warn
          retention-days: 30

      - name: Send Microsoft Teams Notification
        if: ${{ !cancelled() }}
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUM: ${{ github.run_number }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MARKET: "${{ inputs.COUNTRY || 'AU' }}-${{ inputs.LANGUAGE || 'EN' }}"
          SCOPE: "${{ inputs.TEST_TITLE != 'None' && inputs.TEST_TITLE || (inputs.TEST_DESCRIBE != 'None' && inputs.TEST_DESCRIBE || 'Full Test Suite') }}"
          ACTOR: "${{ github.actor }}"
        run: |
          # Determine card styling based on outcome
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ Playwright Tests Passed"
            THEME="good"
          else
            TITLE="❌ Playwright Tests Failed"
            THEME="attention"
          fi

          # Construct the JSON payload for the modern Power Automate Webhook template
          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "body": [
                    { "type": "TextBlock", "size": "Medium", "weight": "Bolder", "text": "$TITLE" },
                    { "type": "FactSet", "facts": [
                        { "title": "Workflow Run:", "value": "#$RUN_NUM" },
                        { "title": "Market Environment:", "value": "$MARKET" },
                        { "title": "Scope:", "value": "$SCOPE" },
                        { "title": "Triggered By:", "value": "@$ACTOR" }
                      ]
                    },
                    { "type": "TextBlock", "text": "📂 **Download HTML Reports & JSON Artifacts:**\nGo to the GitHub Actions Run Summary Page to retrieve your smart-search-results.", "wrap": true }
                  ],
                  "actions": [
                    { "type": "Action.OpenUrl", "title": "View GitHub Run Summary", "url": "$RUN_URL" }
                  ],
                  "$schema": "http://adaptivecards.io",
                  "version": "1.5"
                }
              }
            ]
          }
          EOF
          )

          # Execute HTTP Post request securely
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$TEAMS_WEBHOOK"
